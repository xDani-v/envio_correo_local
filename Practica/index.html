<!doctype html>
<html lang="en">

<head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
    <LINK REL=StyleSheet HREF="styles.css" TYPE="text/css" MEDIA=screen>

    </script>
</head>

<body>

    <form class="frm" action="https://formsubmit.co/913a2e3111537ee2074a4a66f73118e8" enctype="multipart/form-data"
        method="POST">

        <h2>Formulario de envio</h2>
        <div class="mb-3">
            <label for="exampleFormControlInput1" class="form-label">Correo Electronico</label>
            <input type="email" class="form-control" name="Correo electronico:" id="input_correo"
                placeholder="name@example.com">
        </div>

        <div class="mb-3">
            <label for="exampleFormControlInput1" class="form-label">Asunto</label>
            <input type="text" class="form-control" name="Asunto del correo:" id="input_asunto"
                placeholder="Este es mi asunto">
        </div>

        <div class="mb-3">
            <label for="exampleFormControlTextarea1" class="form-label">Contenido</label>
            <textarea class="form-control" name="Contenido:" id="input_contenido" rows="3"></textarea>
        </div>

        <div class="mb-3">
            <label for="formFile" class="form-label">Seleccione un archivo</label>
            <input class="form-control" name="Adjuntos:" type="file" id="formFile">
        </div>

        <button type="submit" class="btn btn-warning">Enviar</button>

    </form>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p"
        crossorigin="anonymous"></script>


</body>

</html>
